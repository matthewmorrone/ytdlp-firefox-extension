<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    :root {
      --bg: #0f1115;
      --card: #1a1d24;
      --card-hi: #232732;
      --text: #e8eaed;
      --muted: #8b93a3;
      --accent: #ff3b30;
      --accent-soft: #4a1f1d;
      --ok: #4ade80;
      --err: #f87171;
      --border: #262a35;
    }
    * { box-sizing: border-box; }
    body {
      font: 13px -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
      width: 380px;
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
    }
    .compose {
      padding: 12px 12px 10px;
      border-bottom: 1px solid var(--border);
    }
    .url {
      font-size: 10.5px;
      color: var(--muted);
      word-break: break-all;
      margin-bottom: 10px;
      max-height: 2.6em;
      overflow: hidden;
      line-height: 1.25;
    }
    .thumb-row {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }
    #thumbWrap {
      position: relative;
      flex: 0 0 auto;
      width: 120px;
    }
    #thumb {
      width: 120px;
      height: 68px;
      object-fit: cover;
      border-radius: 6px;
      display: block;
      transition: opacity 0.15s, filter 0.15s;
      background: var(--card);
    }
    #thumbWrap.disabled #thumb { opacity: 0.3; filter: grayscale(1); }
    #thumbX {
      position: absolute;
      top: 4px; right: 4px;
      width: 22px; height: 22px;
      border: none;
      border-radius: 50%;
      background: rgba(0,0,0,0.7);
      color: #fff;
      cursor: pointer;
      font: 600 14px/22px sans-serif;
      padding: 0;
    }
    #thumbX:hover { background: rgba(0,0,0,0.9); }
    .meta-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }
    input[type=text] {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 8px;
      color: var(--text);
      font: inherit;
    }
    input[type=text]:focus {
      outline: none;
      border-color: var(--accent);
    }
    label.check {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11.5px;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
    }
    label.check input { accent-color: var(--accent); }
    .btn-row {
      display: flex;
      gap: 6px;
    }
    button.fmt {
      flex: 1;
      padding: 8px 0;
      border: 1px solid var(--border);
      background: var(--card-hi);
      color: var(--text);
      border-radius: 6px;
      cursor: pointer;
      font: 600 12px/1 inherit;
      letter-spacing: 0.02em;
      transition: background 0.1s, border-color 0.1s;
    }
    button.fmt:hover { background: var(--accent-soft); border-color: var(--accent); }
    button.fmt:active { transform: translateY(1px); }
    button.fmt[disabled] { opacity: 0.5; cursor: default; }
    .history {
      max-height: 280px;
      overflow-y: auto;
    }
    .history-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px 4px;
      font-size: 10.5px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .clear-btn {
      background: none;
      border: none;
      color: var(--muted);
      font: inherit;
      font-size: 10.5px;
      cursor: pointer;
      text-transform: none;
      letter-spacing: 0;
    }
    .clear-btn:hover { color: var(--err); }
    .empty {
      padding: 18px 12px;
      color: var(--muted);
      text-align: center;
      font-size: 11.5px;
    }
    .item {
      display: flex;
      gap: 8px;
      padding: 8px 12px;
      border-top: 1px solid var(--border);
      align-items: center;
      position: relative;
    }
    .item-thumb {
      width: 56px;
      height: 32px;
      object-fit: cover;
      border-radius: 3px;
      flex: 0 0 auto;
      background: var(--card);
    }
    .item-body { flex: 1; min-width: 0; }
    .item-title {
      font-size: 11.5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 3px;
    }
    .item-sub {
      display: flex;
      gap: 6px;
      align-items: center;
      font-size: 10px;
      color: var(--muted);
    }
    .pill {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 8px;
      background: var(--card-hi);
      font-size: 9.5px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .pill.done { background: rgba(74,222,128,0.15); color: var(--ok); }
    .pill.failed { background: rgba(248,113,113,0.15); color: var(--err); }
    .progress-bar {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 4px;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      width: 0%;
      transition: width 0.2s;
    }
    .progress-fill.done { background: var(--ok); }
    .progress-fill.failed { background: var(--err); }
    .item-x {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 14px;
      padding: 4px;
      line-height: 1;
    }
    .item-x:hover { color: var(--err); }
    /* scrollbar */
    .history::-webkit-scrollbar { width: 8px; }
    .history::-webkit-scrollbar-track { background: var(--bg); }
    .history::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  </style>
</head>
<body>
  <div class="compose">
    <div class="thumb-row">
      <div id="thumbWrap">
        <img id="thumb" alt="">
        <button id="thumbX" title="don't embed thumbnail in file">×</button>
      </div>
      <div class="meta-col">
        <input type="text" id="filename" placeholder="filename (no extension)">
        <label class="check"><input type="checkbox" id="metadata" checked> Embed metadata</label>
      </div>
    </div>
    <div class="btn-row">
      <button class="fmt" data-format="mp4">video</button>
      <button class="fmt" data-format="mp3">audio</button>
    </div>
  </div>
  <div class="history-head">
    <span>downloads</span>
    <button class="clear-btn" id="clear">clear</button>
  </div>
  <div class="history" id="history"></div>
  <script src="popup.js"></script>
</body>
</html>
